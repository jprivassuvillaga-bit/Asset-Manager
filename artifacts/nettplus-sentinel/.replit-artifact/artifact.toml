kind = "web"
previewPath = "/"
title = "Nettplus Competitor Sentinel"
version = "1.0.0"
id = "artifacts/nettplus-sentinel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25080

[services.development]
run = "pnpm --filter @workspace/nettplus-sentinel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nettplus-sentinel", "run", "build" ]
publicDir = "artifacts/nettplus-sentinel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25080"
BASE_PATH = "/"
